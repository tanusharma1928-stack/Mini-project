<!DOCTYPE html>
<html>
<head>
    <title>ShieldAI Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6a11cb; --secondary: #2575fc; --bg: #f8f9ff; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
        .navbar { background: #111; padding: 15px 0; }
        .nav-link { font-weight: 600; font-size: 0.85rem; color: #fff !important; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
        .bento-card { background: white; border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.03); padding: 30px; margin-bottom: 20px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; padding: 12px 25px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index">🛡️ SHIELD AI</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="/index">Home / Analyze</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="/how-it-works">How It Works</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link text-warning" href="/contact">Helplines</a></li>
                    <li class="nav-item"><a class="btn btn-sm btn-outline-light rounded-pill px-3 ms-2" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
